# Konfigurasi LLM
LLM:
  ChatGLMLLM:
    # Mendefinisikan tipe API LLM
    type: openai
    # glm-4-flash gratis, namun tetap perlu daftar dan isi api_key
    # Temukan api key Anda di sini: https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    model_name: glm-4-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: 你的api_key
  OllamaLLM:
    # Mendefinisikan tipe API LLM
    type: ollama
    model_name: qwen3 # Nama model yang digunakan, perlu diunduh terlebih dahulu dengan ollama pull
    url: http://localhost:11434 # Alamat layanan Ollama
  DoubaoLLM:
    # Mendefinisikan tipe API LLM
    type: doubao
    # doubao-seed-1.6-251015 adalah model deep thinking Doubao, deepseek-v3-1-terminus performanya cukup baik
    # Temukan api key Anda di sini: https://console.volcengine.com/ark
    model_name: doubao-seed-1.6-251015
    url: https://ark.cn-beijing.volces.com/api/v3
    api_key: 你的api_key
    thinking: disabled # Mode berpikir: disabled (matikan) atau enabled (aktifkan)
    max_tokens: 4000
  CozeLLM:
    # Mendefinisikan tipe API LLM
    type: coze
    bot_id: 你的bot_id
    user_id: 你的user_id
    # Lingkungan produksi
    # Buat aplikasi layanan OAuth di sini untuk mendapatkan client_id, public_key, private_key: https://www.coze.cn/open/oauth/apps
    client_id: 你的coze clientId
    public_key: 你的coze 公钥
    private_key: 你的coze 私钥
    # Untuk pengujian pribadi, jika client_id/public_key/private_key sudah diisi, kolom ini tidak perlu diisi
    # Temukan personal_access_token Anda di sini: https://www.coze.cn/open/oauth/pats
    personal_access_token: 你的coze个人令牌
    url: "https://api.coze.cn" # Alamat layanan Coze

# Perintah keluar
CMD_exit:
  - "退出"
  - "关闭"

# Konfigurasi VLLLM (Model Bahasa Visual Besar)
VLLLM:
  ChatGLMVLLM:
    type: openai
    model_name: glm-4v-flash # Model visual dari Zhipu AI
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: 你的api_key
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.9
    security: # Konfigurasi keamanan gambar
      max_file_size: 10485760 # 10MB
      max_pixels: 16777216 # 16 juta piksel
      max_width: 4096
      max_height: 4096
      allowed_formats: ["jpeg", "jpg", "png", "webp", "gif"]
      enable_deep_scan: true
      validation_timeout: 10s
  OllamaVLLM:
    type: ollama
    model_name: qwen2.5vl # Model visual lokal
    url: http://localhost:11434
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.9
    security: # Konfigurasi keamanan gambar
      max_file_size: 10485760 # 10MB
      max_pixels: 16777216 # 16 juta piksel
      max_width: 4096
      max_height: 4096
      allowed_formats: ["jpeg", "jpg", "png", "webp", "gif"]
      enable_deep_scan: true
      validation_timeout: 10s

# Konfigurasi pool koneksi
pool_config:
  pool_min_size: 5
  pool_max_size: 20
  pool_refill_size: 3
  pool_check_interval: 30
mcp_pool_config:
  pool_min_size: 5
  pool_max_size: 20
  pool_refill_size: 3
  pool_check_interval: 30
