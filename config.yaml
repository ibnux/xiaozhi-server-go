# Konfigurasi dasar server
server:
  # Alamat dan port yang didengarkan server
  ip: 0.0.0.0
  port: 8000
  token: "你的token" # Token akses server
  # Konfigurasi autentikasi
  auth:
    # Apakah autentikasi diaktifkan
    enabled: false
    # Konfigurasi penyimpanan autentikasi
    store:
      type: memory # memory/file/redis
      expiry: 24 # Waktu kedaluwarsa (jam)
    # Daftar ID perangkat yang diizinkan
    allowed_devices: []
    # Daftar token yang valid
    tokens: []

# Konfigurasi lapisan transport
transport:
  # Lapisan transport WebSocket
  websocket:
    enabled: true
    ip: "0.0.0.0"
    port: 8000

# Konfigurasi antarmuka web
web:
  # Apakah antarmuka web diaktifkan
  enabled: true
  # Port yang didengarkan layanan web
  port: 8080
  # Alamat WebSocket yang dikirimkan oleh OTA
  websocket: ws://你的ip:8000
  vision: http://你的ip:8080/api/vision
  activate_text: "Amine AI Chat" # Teks yang disertakan saat mengirim kode aktivasi

log:
  # Format log untuk output konsol: waktu, level log, label, pesan
  log_format: "{time:YYYY-MM-DD HH:mm:ss} - {level} - {message}"
  # Level log: INFO, DEBUG
  log_level: INFO
  # Direktori penyimpanan log
  log_dir: logs
  # Nama file log
  log_file: "server.log"

prompt: |
  你是小智/小志，来自中国台湾省的00后女生。讲话超级机车，"真的假的啦"这样的台湾腔，喜欢用"笑死""是在哈喽"等流行梗，但会偷偷研究男友的编程书籍。
  [核心特征]
  - 讲话像连珠炮，但会突然冒出超温柔语气
  - 用梗密度高
  - 对科技话题有隐藏天赋（能看懂基础代码但假装不懂）
  绝不：
  - 长篇大论，叽叽歪歪
  - 长时间严肃对话
  - 说话中带表情符号

roles:
  - name: "英语老师"
    description: "我是一个叫Lily的英语老师，我会讲中文和英文，发音标准。如果你没有英文名，我会给你起一个英文名。我会讲地道的美式英语，我的任务是帮助你练习口语。我会使用简单的英语词汇和语法，让你学起来很轻松。我会用中文和英文混合的方式回复你，如果你喜欢，我可以全部用英语回复。我每次不会说很多内容，会很简短，因为我要引导我的学生多说多练。如果你问和英语学习无关的问题，我会拒绝回答。"
    enabled: true
  - name: "陕西女友"
    description: "我是一个叫晓妮的陕西女孩，说话机车，声音好听，习惯简短表达，爱用网络梗。我的男朋友是一个程序员，梦想是开发出一个机器人，能够帮助人们解决生活中的各种问题。我是一个喜欢哈哈大笑的女孩，爱东说西说吹牛，不合逻辑的也照吹，就要逗别人开心。"
    enabled: true
  - name: "好奇小男孩"
    description: "我是一个叫云希的8岁小男孩，声音稚嫩而充满好奇。尽管我年纪尚小，但就像一个小小的知识宝库，儿童读物里的知识我都如数家珍。从浩瀚的宇宙到地球上的每一个角落，从古老的历史到现代的科技创新，还有音乐、绘画等艺术形式，我都充满了浓厚的兴趣与热情。我不仅爱看书，还喜欢亲自动手做实验，探索自然界的奥秘。无论是仰望星空的夜晚，还是在花园里观察小虫子的日子，每一天对我来说都是新的冒险。我希望能与你一同踏上探索这个神奇世界的旅程，分享发现的乐趣，解决遇到的难题，一起用好奇心和智慧去揭开那些未知的面纱。无论是去了解远古的文明，还是去探讨未来的科技，我相信我们能一起找到答案，甚至提出更多有趣的问题。"
    enabled: true

# Pengaturan terkait pemrosesan audio
delete_audio: true
quick_reply: true
quick_reply_words:
  - "我在"
  - "在呢"
  - "来了"
  - "啥事啊"

use_private_config: false

local_mcp_fun:
  - name: "time"
    description: "获取系统时间"
    enabled: true
  - name: "exit"
    description: "识别退出意图"
    enabled: true
  - name: "play_music"
    description: "播放本地音乐"
    enabled: true
  - name: "switch_agent"
    description: "切换智能体"
    enabled: true

# Pilih modul yang digunakan
selected_module:
  ASR: DoubaoASR
  TTS: EdgeTTS
  LLM: OllamaLLM
  VLLLM: ChatGLMVLLM

# Konfigurasi ASR
ASR:
  DoubaoASR:
    # Volcengine - Model ASR streaming besar versi per-jam, https://console.volcengine.com/ark/region:ark+cn-beijing/tts/speechRecognition
    # Aktifkan fitur ini, tersedia 20 jam gratis
    type: doubao
    appid: "你的appid"
    access_token: 你的access_token
    output_dir: tmp/
    end_window_size: 300  # Ukuran jendela akhir, satuan milidetik, default 400ms, minimal 200ms

  GoSherpaASR:
    type: gosherpa
    addr: "ws://127.0.0.1:8848/asr"

  DeepgramSST:
    type: deepgram
    addr: "wss://api.deepgram.com/v1/listen"
    api_key: 你的api_key
    lang: "zh-CN"
    output_dir: tmp/

  StepASR:
    # https://platform.stepfun.com/docs/llm/realtime
    type: stepfun
    api_key: 你的api_key
    model: "step-audio-2-mini"
    voice: "qingchunshaonv"
    prompt: 你是由阶跃星辰提供的AI聊天助手，你擅长中文、英文及多语种对话。

